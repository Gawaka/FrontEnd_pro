<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>
    <div class="slider">
        <div class="slides">
            <img src="./img/1.png" alt="Slide" class="slide">
            <img src="./img/2.png" alt="Slide" class="slide">
            <img src="./img/3.png" alt="Slide" class="slide">
            <img src="./img/4.png" alt="Slide" class="slide">
            <img src="./img/5.png" alt="Slide" class="slide">
        </div>

        <button class="prev">&#10094;</button>
        <button class="next">&#10095;</button>

        <div class="dots">
            <span data-index="1" class="dot active"></span>
            <span data-index="2" class="dot"></span>
            <span data-index="3" class="dot"></span>
            <span data-index="4" class="dot"></span>
            <span data-index="5" class="dot"></span>
        </div>
    </div>

    <script src="script01.js"></script>
</body>
</html>
